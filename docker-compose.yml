services:
  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: medusa_backend
    ports:
      - "9000:9000"
    env_file:
      - ./apps/backend/.env
    volumes:
      - ./apps/backend:/app
      - /app/node_modules
    restart: unless-stopped

  storefront:
    build:
      context: ./apps/storefront
      dockerfile: Dockerfile
    container_name: medusa_storefront
    ports:
      - "5173:5173"
    env_file:
      - ./apps/storefront/.env
    volumes:
      - ./apps/storefront:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped

  proxy:
    build:
      context: .
      dockerfile: Dockerfile   # make sure this exists in root
    container_name: medusa_proxy
    ports:
      - "5000:5000"
    depends_on:
      - backend
      - storefront
    restart: unless-stopped
    